<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&amp;display=swap');
      
      text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        fill: #565f89;
      }
      
      .engine-title {
        font-size: 13px;
        font-weight: 700;
        fill: #73d0ff;
        letter-spacing: 2px;
        filter: drop-shadow(0 0 6px rgba(115,208,255,0.6));
      }
      
      .node-title {
        font-size: 11px;
        font-weight: 500;
        fill: #c0caf5;
      }

      .console-log {
        fill: #a9b1d6;
        font-size: 9.5px;
      }

      /* Glowing paths & pulses */
      .loop-line {
        stroke: #383e5a;
        stroke-width: 1.5;
        fill: none;
      }

      .pulse-laser {
        stroke: #73d0ff;
        stroke-width: 2.5;
        stroke-linecap: round;
        filter: drop-shadow(0 0 5px #73d0ff);
        stroke-dasharray: 40 180;
        animation: loopflow 4s linear infinite;
      }

      .pulsing-sphere {
        fill: #73d0ff;
        filter: drop-shadow(0 0 8px #73d0ff);
        animation: breath 2s ease-in-out infinite alternate;
      }

      .pulsing-ring {
        stroke: #bb9af3;
        stroke-width: 1;
        fill: none;
        transform-origin: center;
        animation: ripple 3s ease-out infinite;
      }

      /* Rotations for Cognitive Core */
      @keyframes spin-clockwise {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes spin-counter {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }

      .orbit-cw {
        transform-origin: 400px 120px;
        animation: spin-clockwise 10s linear infinite;
      }

      .orbit-ccw {
        transform-origin: 400px 120px;
        animation: spin-counter 12s linear infinite;
      }

      @keyframes loopflow {
        0% { stroke-dashoffset: 220; }
        100% { stroke-dashoffset: 0; }
      }

      @keyframes breath {
        0% { r: 6; opacity: 0.7; }
        100% { r: 12; opacity: 1; }
      }

      @keyframes ripple {
        0% { r: 6; opacity: 1; }
        100% { r: 24; opacity: 0; }
      }
      
      /* Grid background */
      .bg-rect {
        fill: #0f111a;
        stroke: #24283b;
        stroke-width: 1.5px;
      }
    </style>

    <!-- Grid pattern -->
    <pattern id="coreGrid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1f2335" stroke-width="0.8" opacity="0.5" />
    </pattern>

    <!-- Typing logs clip paths -->
    <clipPath id="logClip">
      <rect x="250" y="225" width="300" height="70" />
    </clipPath>
  </defs>

  <!-- Canvas Background -->
  <rect class="bg-rect" width="100%" height="100%" rx="12" />
  <rect width="100%" height="100%" fill="url(#coreGrid)" rx="12" />

  <!-- Title block -->
  <text x="30" y="32" class="engine-title">> COGNITIVE ENGINE // AUTONOMOUS AGENT LOOP</text>
  <text x="770" y="32" text-anchor="end" fill="#9ece6a">STATE: EXECUTION_RUNNING</text>
  <line x1="30" y1="42" x2="770" y2="42" stroke="#24283b" stroke-width="1.5" />

  <!-- ================= THE LOOP (Perceive -> Plan -> Act) ================= -->
  <!-- Triangular communication loop path -->
  <path d="M 200,140 L 400,60 L 600,140 Z" class="loop-line" />
  
  <!-- Glowing signal pulses along path -->
  <path d="M 200,140 L 400,60 L 600,140 Z" class="pulse-laser" />

  <!-- Node 1: PERCEPTION GATEWAY (Left) -->
  <g transform="translate(0, 0)">
    <circle cx="200" cy="140" r="8" fill="#73d0ff" class="glow-cyan" />
    <circle cx="200" cy="140" r="12" class="pulsing-ring" stroke="#73d0ff" />
    <text x="200" y="162" class="node-title" text-anchor="middle">PERCEIVE</text>
    <text x="200" y="174" fill="#565f89" text-anchor="middle">Input Senses</text>
  </g>

  <!-- Node 2: COGNITION CORE (Top) -->
  <g transform="translate(0, 0)">
    <!-- Central Brain Node / Orb -->
    <circle cx="400" cy="60" r="10" class="pulsing-sphere" />
    <circle cx="400" cy="60" r="18" class="pulsing-ring" stroke="#73d0ff" />
    <text x="400" y="38" class="node-title" text-anchor="middle">PLAN</text>
    <text x="400" y="26" fill="#7aa2f7" text-anchor="middle" font-weight="bold">REASONING ENGINE</text>
  </g>

  <!-- Node 3: ACTION EXECUTIVE (Right) -->
  <g transform="translate(0, 0)">
    <circle cx="600" cy="140" r="8" fill="#bb9af3" class="glow-blue" />
    <circle cx="600" cy="140" r="12" class="pulsing-ring" stroke="#bb9af3" />
    <text x="600" y="162" class="node-title" text-anchor="middle">ACT</text>
    <text x="600" y="174" fill="#565f89" text-anchor="middle">Tool Execution</text>
  </g>

  <!-- ================= COGNITIVE CORE ROTATING RINGS ================= -->
  <!-- Outer orbital ring -->
  <g class="orbit-cw">
    <circle cx="400" cy="120" r="45" fill="none" stroke="#24283b" stroke-width="1" stroke-dasharray="10 40 30 10" />
    <circle cx="438" cy="98" r="3" fill="#73d0ff" class="glow-cyan" />
  </g>
  <!-- Inner orbital ring -->
  <g class="orbit-ccw">
    <circle cx="400" cy="120" r="30" fill="none" stroke="#383e5a" stroke-width="1" stroke-dasharray="40 10 20 30" />
    <circle cx="379" cy="99" r="2.5" fill="#bb9af3" class="glow-blue" />
  </g>

  <!-- Core Center Blinker -->
  <circle cx="400" cy="120" r="4" fill="#73d0ff" />

  <!-- ================= TERMINAL LIVE LOGS CONSOLE ================= -->
  <g transform="translate(0, 0)">
    <!-- Console frame -->
    <rect x="230" y="205" width="340" height="95" rx="5" fill="#0c0e14" stroke="#24283b" stroke-width="1" />
    <rect x="230" y="205" width="340" height="18" rx="5" fill="#161925" />
    <circle cx="242" cy="214" r="3" fill="#f7768e" />
    <circle cx="250" cy="214" r="3" fill="#e0af68" />
    <circle cx="258" cy="214" r="3" fill="#9ece6a" />
    <text x="400" y="217" fill="#565f89" font-size="8" text-anchor="middle">AGENT_LOGS_STREAM</text>

    <!-- Scrollable/Animated terminal texts -->
    <g clip-path="url(#logClip)" transform="translate(10, 8)">
      <g>
        <animateTransform attributeName="transform" type="translate"
                          values="0,45; 0,25; 0,5; 0,-15; 0,-35; 0,-55; 0,-75; 0,-95"
                          keyTimes="0; 0.14; 0.28; 0.42; 0.56; 0.70; 0.84; 1"
                          dur="12s" repeatCount="indefinite" type="translate" />
        
        <text x="240" y="235" class="console-log" fill="#7aa2f7">[perceive] user request detected</text>
        <text x="240" y="255" class="console-log" fill="#bb9af3">[reason]   formulating system path</text>
        <text x="240" y="275" class="console-log" fill="#e0af68">[plan]     subgoal: execute python_sandbox</text>
        <text x="240" y="295" class="console-log" fill="#9ece6a">[act]      sandbox execution output: success</text>
        <text x="240" y="315" class="console-log" fill="#73d0ff">[synthesize] structuring response model</text>
        <text x="240" y="335" class="console-log" fill="#9ece6a">[agent]    loop complete. standing by...</text>
        <text x="240" y="355" class="console-log" fill="#7aa2f7">[perceive] listening on socket 8080</text>
        <text x="240" y="375" class="console-log" fill="#ff9e64">[status]   active_nodes: 3 // memory: optimal</text>
      </g>
    </g>
  </g>

  <!-- Side graphic telemetry decors -->
  <line x1="30" y1="280" x2="180" y2="280" stroke="#24283b" stroke-width="1" />
  <circle cx="30" cy="280" r="2" fill="#565f89" />
  <text x="40" y="274" fill="#565f89">COGNITIVE_REASONING_ENG</text>

  <line x1="620" y1="280" x2="770" y2="280" stroke="#24283b" stroke-width="1" />
  <circle cx="770" cy="280" r="2" fill="#565f89" />
  <text x="760" y="274" fill="#565f89" text-anchor="end">SYS_DYNAMICS: OK</text>

</svg>
