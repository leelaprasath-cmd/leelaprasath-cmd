<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Imports -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #565f89;
      }
      
      .brand-title {
        font-size: 18px;
        font-weight: 800;
        fill: #73d0ff;
        letter-spacing: 2px;
        filter: drop-shadow(0 0 8px rgba(115,208,255,0.6));
      }
      
      .brand-subtitle {
        font-size: 11px;
        fill: #7aa2f7;
        letter-spacing: 1px;
      }

      .node-text {
        fill: #c0caf5;
        font-size: 10px;
      }

      /* Glowing paths & pulses */
      .connection-line {
        stroke: #383e5a;
        stroke-width: 1.5;
        stroke-dasharray: 4 4;
        animation: march 4s linear infinite;
      }

      .pulse-dot {
        fill: #73d0ff;
        filter: drop-shadow(0 0 4px #73d0ff);
      }

      .pulsing-ring {
        stroke: #73d0ff;
        stroke-width: 1;
        fill: none;
        transform-origin: center;
        animation: ripple 3s ease-out infinite;
      }

      .cpu-wave {
        stroke: #73d0ff;
        stroke-width: 2;
        fill: none;
        filter: drop-shadow(0 0 5px rgba(115,208,255,0.5));
      }
      
      .cpu-grid {
        stroke: #1a1b26;
        stroke-width: 1;
      }

      @keyframes march {
        to { stroke-dashoffset: -20; }
      }

      @keyframes ripple {
        0% { r: 4; opacity: 1; }
        100% { r: 16; opacity: 0; }
      }

      @keyframes scan {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .scanner-arm {
        transform-origin: 700px 120px;
        animation: scan 8s linear infinite;
        stroke: #7aa2f7;
        opacity: 0.7;
      }
    </style>

    <!-- Grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#24283b" stroke-width="0.8" opacity="0.6" />
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="#1a1b26" rx="10" stroke="#383e5a" stroke-width="1.5" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="10" />

  <!-- ================= LEFT: TELEMETRY IDENTITY ================= -->
  <!-- Top decorative line -->
  <line x1="30" y1="35" x2="330" y2="35" stroke="#73d0ff" stroke-width="2" opacity="0.8" />
  
  <text x="30" y="55" class="brand-title">LEELA PRASATH</text>
  <text x="30" y="73" class="brand-subtitle">> FUTURE AGENTIC SYSTEMS ENGINEER</text>

  <!-- System Console Logs -->
  <g transform="translate(30, 95)">
    <!-- Terminal Header Symbol -->
    <rect x="0" y="0" width="280" height="115" rx="5" fill="#0f111a" stroke="#24283b" stroke-width="1" />
    
    <!-- Status Specs -->
    <text x="15" y="20" fill="#73d0ff">> SYS_STATUS: ACTIVE</text>
    <text x="15" y="38" fill="#9ece6a">> LOGS: WEEK_1_FOUNDATIONS_OK</text>
    <text x="15" y="56" fill="#c0caf5">> NODE_ID: LEELA_PRASATH_01</text>
    <text x="15" y="74" fill="#ff9e64">> TARGET: DISTRIBUTED_AI_NETS</text>
    <text x="15" y="92" fill="#565f89">> NET_LOAD: OK // BENCHMARK: PASS</text>
    
    <!-- Mini green blinker -->
    <circle cx="260" cy="18" r="4" fill="#9ece6a" />
    <circle cx="260" cy="18" r="8" class="pulsing-ring" stroke="#9ece6a" />
  </g>

  <!-- ================= MIDDLE: DISTRIBUTED NETWORK GRAPH ================= -->
  <!-- Connecting lines -->
  <!-- Node A (380, 70) to Node B (480, 50) -->
  <line x1="380" y1="70" x2="480" y2="50" class="connection-line" />
  <!-- Node A (380, 70) to Node C (440, 160) -->
  <line x1="380" y1="70" x2="440" y2="160" class="connection-line" />
  <!-- Node B (480, 50) to Node D (540, 120) -->
  <line x1="480" y1="50" x2="540" y2="120" class="connection-line" />
  <!-- Node C (440, 160) to Node D (540, 120) -->
  <line x1="440" y1="160" x2="540" y2="120" class="connection-line" />
  
  <!-- Flowing packet pulses -->
  <!-- Packet on AB -->
  <circle r="3" class="pulse-dot">
    <animateMotion path="M 380,70 L 480,50" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <!-- Packet on AC -->
  <circle r="3" class="pulse-dot" fill="#bb9af3" style="filter: drop-shadow(0 0 4px #bb9af3);">
    <animateMotion path="M 380,70 L 440,160" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <!-- Packet on CD -->
  <circle r="3" class="pulse-dot">
    <animateMotion path="M 440,160 L 540,120" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Pulsing rings for Nodes -->
  <circle cx="380" cy="70" r="5" fill="#73d0ff" />
  <circle cx="380" cy="70" r="10" class="pulsing-ring" />
  <text x="350" y="90" class="node-text">AI_GATEWAY</text>

  <circle cx="480" cy="50" r="5" fill="#bb9af3" />
  <circle cx="480" cy="50" r="10" class="pulsing-ring" stroke="#bb9af3" />
  <text x="460" y="38" class="node-text">LLM_CORE</text>

  <circle cx="440" cy="160" r="5" fill="#7aa2f7" />
  <circle cx="440" cy="160" r="10" class="pulsing-ring" stroke="#7aa2f7" />
  <text x="415" y="180" class="node-text">DB_STORE</text>

  <circle cx="540" cy="120" r="5" fill="#9ece6a" />
  <circle cx="540" cy="120" r="10" class="pulsing-ring" stroke="#9ece6a" />
  <text x="530" y="140" class="node-text">NODE_EVAL</text>


  <!-- ================= RIGHT: TELEMETRY RADAR & CPU GRAPH ================= -->
  <!-- High-tech Scanning Radar -->
  <g transform="translate(0, 0)">
    <!-- Radar Base Circle -->
    <circle cx="700" cy="120" r="45" fill="none" stroke="#24283b" stroke-width="1.5" />
    <circle cx="700" cy="120" r="30" fill="none" stroke="#24283b" stroke-width="1" />
    <circle cx="700" cy="120" r="15" fill="none" stroke="#24283b" stroke-width="0.5" />
    <circle cx="700" cy="120" r="1.5" fill="#73d0ff" />
    
    <!-- Sweep Arm -->
    <line x1="700" y1="120" x2="700" y2="75" stroke="#73d0ff" stroke-width="1.5" class="scanner-arm" />
    <text x="700" y="182" fill="#565f89" text-anchor="middle" font-size="8">RADAR_SWEEP</text>
  </g>

  <!-- CPU Waveform Monitor -->
  <g transform="translate(595, 20)">
    <rect width="180" height="40" rx="3" fill="#0f111a" stroke="#24283b" stroke-width="1" />
    
    <!-- Grid elements inside CPU box -->
    <line x1="45" y1="0" x2="45" y2="40" stroke="#1a1b26" stroke-width="1" />
    <line x1="90" y1="0" x2="90" y2="40" stroke="#1a1b26" stroke-width="1" />
    <line x1="135" y1="0" x2="135" y2="40" stroke="#1a1b26" stroke-width="1" />
    <line x1="0" y1="20" x2="180" y2="20" stroke="#1a1b26" stroke-width="1" />

    <!-- CPU usage wave path animated -->
    <path class="cpu-wave" d="M 0,25 Q 20,5 40,25 T 80,25 T 120,25 T 160,10 T 180,25">
      <animate attributeName="d" 
               values="M 0,25 Q 20,5 40,25 T 80,25 T 120,25 T 160,10 T 180,25;
                       M 0,25 Q 20,35 40,25 T 80,10 T 120,35 T 160,25 T 180,25;
                       M 0,25 Q 20,10 40,25 T 80,25 T 120,10 T 160,35 T 180,25;
                       M 0,25 Q 20,5 40,25 T 80,25 T 120,25 T 160,10 T 180,25"
               dur="5s" repeatCount="indefinite" />
    </path>
    <text x="5" y="12" fill="#565f89" font-size="8">CPU_LOAD</text>
  </g>

  <!-- Telemetry decoration markers -->
  <rect x="760" y="215" width="10" height="4" fill="#73d0ff" />
  <rect x="775" y="215" width="10" height="4" fill="#7aa2f7" />
  <rect x="790" y="215" width="10" height="4" fill="#565f89" />
  <text x="30" y="222" fill="#565f89">SYS_MONITOR // NODE_01_SECURE</text>
</svg>
