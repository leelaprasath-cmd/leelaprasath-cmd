<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        fill: #565f89;
      }
      
      .grid-title {
        font-size: 11px;
        font-weight: bold;
        fill: #73d0ff;
        letter-spacing: 1px;
      }

      /* Glow effects */
      .glow-cyan {
        filter: drop-shadow(0 0 6px rgba(115, 208, 255, 0.8));
      }
      .glow-blue {
        filter: drop-shadow(0 0 6px rgba(122, 162, 247, 0.8));
      }

      /* Pulsing animations */
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      .pulse-1 { animation: pulse 3s infinite ease-in-out; }
      .pulse-2 { animation: pulse 4s infinite ease-in-out; }
      .pulse-3 { animation: pulse 2.5s infinite ease-in-out; }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      
      .floating-grid {
        animation: float 6s infinite ease-in-out;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1b26" rx="10" stroke="#383e5a" stroke-width="1.5" />
  
  <!-- Outer Frame / Console Border -->
  <path d="M 20,40 L 780,40" stroke="#24283b" stroke-width="1" />
  
  <!-- Title / Telemetry Header -->
  <text x="30" y="27" class="grid-title">CLUSTER TELEMETRY // 3D SYSTEMS MATRIX</text>
  <text x="770" y="27" text-anchor="end" fill="#9ece6a">GRID STATUS: ACTIVE</text>
  
  <!-- ================= 3D ISOMETRIC BLADES (Floating Grid) ================= -->
  <!-- 
    Isometric Projection math helper:
    origin at (300, 105)
    X-axis (down-left): x = origin_x - col * 20, y = origin_y + col * 10
    Y-axis (down-right): x = origin_x + row * 24, y = origin_y + row * 12
  -->
  <g class="floating-grid" transform="translate(180, 10)">
    <!-- Column 1 (Background row) -->
    <!-- Blade 1,1 (Idle) -->
    <g transform="translate(100, 50)">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#1f2335" stroke="#383e5a" stroke-width="0.5" />
      <polygon points="0,0 20,10 20,22 0,12" fill="#1c1f30" stroke="#383e5a" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,12 20,22" fill="#161925" stroke="#383e5a" stroke-width="0.5" />
    </g>
    <!-- Blade 1,2 (Active - Cyan) -->
    <g transform="translate(124, 62)" class="pulse-1">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#73d0ff" stroke="#73d0ff" stroke-width="0.5" class="glow-cyan" />
      <polygon points="0,0 20,10 20,28 0,18" fill="#4ba3e3" stroke="#73d0ff" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,18 20,28" fill="#2d7cb5" stroke="#73d0ff" stroke-width="0.5" />
    </g>
    <!-- Blade 1,3 (Active - Blue) -->
    <g transform="translate(148, 74)">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#7aa2f7" stroke="#7aa2f7" stroke-width="0.5" class="glow-blue" />
      <polygon points="0,0 20,10 20,20 0,10" fill="#5c82db" stroke="#7aa2f7" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,10 20,20" fill="#3d5fa6" stroke="#7aa2f7" stroke-width="0.5" />
    </g>
    
    <!-- Column 2 -->
    <g transform="translate(76, 62)">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#7aa2f7" stroke="#7aa2f7" stroke-width="0.5" class="glow-blue" />
      <polygon points="0,0 20,10 20,25 0,15" fill="#5c82db" stroke="#7aa2f7" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,15 20,25" fill="#3d5fa6" stroke="#7aa2f7" stroke-width="0.5" />
    </g>
    <g transform="translate(100, 74)">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#1f2335" stroke="#383e5a" stroke-width="0.5" />
      <polygon points="0,0 20,10 20,12 0,2" fill="#1c1f30" stroke="#383e5a" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,2 20,12" fill="#161925" stroke="#383e5a" stroke-width="0.5" />
    </g>
    <g transform="translate(124, 86)" class="pulse-2">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#73d0ff" stroke="#73d0ff" stroke-width="0.5" class="glow-cyan" />
      <polygon points="0,0 20,10 20,32 0,22" fill="#4ba3e3" stroke="#73d0ff" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,22 20,32" fill="#2d7cb5" stroke="#73d0ff" stroke-width="0.5" />
    </g>
    
    <!-- Column 3 -->
    <g transform="translate(52, 74)" class="pulse-3">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#73d0ff" stroke="#73d0ff" stroke-width="0.5" class="glow-cyan" />
      <polygon points="0,0 20,10 20,30 0,20" fill="#4ba3e3" stroke="#73d0ff" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,20 20,30" fill="#2d7cb5" stroke="#73d0ff" stroke-width="0.5" />
    </g>
    <g transform="translate(76, 86)">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#7aa2f7" stroke="#7aa2f7" stroke-width="0.5" class="glow-blue" />
      <polygon points="0,0 20,10 20,24 0,14" fill="#5c82db" stroke="#7aa2f7" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,14 20,24" fill="#3d5fa6" stroke="#7aa2f7" stroke-width="0.5" />
    </g>
    <g transform="translate(100, 98)">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#1f2335" stroke="#383e5a" stroke-width="0.5" />
      <polygon points="0,0 20,10 20,15 0,5" fill="#1c1f30" stroke="#383e5a" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,5 20,15" fill="#161925" stroke="#383e5a" stroke-width="0.5" />
    </g>
    
    <!-- Column 4 -->
    <g transform="translate(28, 86)">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#1f2335" stroke="#383e5a" stroke-width="0.5" />
      <polygon points="0,0 20,10 20,15 0,5" fill="#1c1f30" stroke="#383e5a" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,5 20,15" fill="#161925" stroke="#383e5a" stroke-width="0.5" />
    </g>
    <g transform="translate(52, 98)" class="pulse-2">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#73d0ff" stroke="#73d0ff" stroke-width="0.5" class="glow-cyan" />
      <polygon points="0,0 20,10 20,28 0,18" fill="#4ba3e3" stroke="#73d0ff" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,18 20,28" fill="#2d7cb5" stroke="#73d0ff" stroke-width="0.5" />
    </g>
    <g transform="translate(76, 110)">
      <polygon points="0,0 20,-10 40,0 20,10" fill="#7aa2f7" stroke="#7aa2f7" stroke-width="0.5" class="glow-blue" />
      <polygon points="0,0 20,10 20,20 0,10" fill="#5c82db" stroke="#7aa2f7" stroke-width="0.5" />
      <polygon points="20,10 40,0 40,10 20,20" fill="#3d5fa6" stroke="#7aa2f7" stroke-width="0.5" />
    </g>

    <!-- Side Circuit Paths -->
    <path d="M 0,96 L -30,111 L -30,135" fill="none" stroke="#383e5a" stroke-width="1.5" />
    <path d="M 188,74 L 210,85 L 210,120" fill="none" stroke="#383e5a" stroke-width="1.5" />
    <circle cx="-30" cy="135" r="3" fill="#7aa2f7" />
    <circle cx="210" cy="120" r="3" fill="#73d0ff" />
  </g>

  <!-- ================= SIDE CONSOLE PANEL ================= -->
  <g transform="translate(480, 60)">
    <!-- Back panel border -->
    <rect x="0" y="0" width="280" height="145" rx="5" fill="#0f111a" stroke="#24283b" stroke-width="1.2" />
    
    <!-- Diagnostics lines -->
    <text x="15" y="25" fill="#7aa2f7">> NODE_LOCATION: ASIA-SOUTH</text>
    <text x="15" y="45" fill="#c0caf5">> SYSTEM_TEMP: 31.8°C [STABLE]</text>
    
    <!-- Fan Speeds / Core Telemetry -->
    <text x="15" y="65" fill="#565f89">> ACTIVE_CORES: 12 / 12</text>
    <text x="15" y="85" fill="#73d0ff">> MEMORY_STAT: 11.2GB / 16.0GB</text>
    
    <!-- Custom Bar Charts -->
    <text x="15" y="105" fill="#9ece6a">> DISK_LOAD: [||||||||||..........]</text>
    <text x="15" y="125" fill="#ff9e64">> REPO_NODES: 6 SYNCED</text>
    
    <!-- Status Blinker -->
    <rect x="250" y="12" width="16" height="8" rx="2" fill="#9ece6a" opacity="0.8" />
  </g>

  <!-- ================= LEGEND BAR ================= -->
  <g transform="translate(30, 210)">
    <!-- Legend item 1 -->
    <polygon points="0,0 8,-4 16,0 8,4" fill="#73d0ff" stroke="#73d0ff" stroke-width="0.5" class="glow-cyan" />
    <text x="25" y="3" fill="#c0caf5">Active AI Node</text>

    <!-- Legend item 2 -->
    <polygon points="150,0 158,-4 166,0 158,4" fill="#7aa2f7" stroke="#7aa2f7" stroke-width="0.5" class="glow-blue" />
    <text x="175" y="3" fill="#c0caf5">Systems Core</text>

    <!-- Legend item 3 -->
    <polygon points="300,0 308,-4 316,0 308,4" fill="#1f2335" stroke="#383e5a" stroke-width="0.5" />
    <text x="325" y="3" fill="#c0caf5">Standby Nodes</text>
  </g>

</svg>
