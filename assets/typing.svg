<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 210" width="680" height="210" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Importing JetBrains Mono -->
    <style>
      text {
        font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
        font-size: 14px;
        fill: #c0caf5;
      }
      
      /* Neon/Tokyo Night Theme Colors */
      .prompt-user { fill: #9ece6a; font-weight: bold; }
      .prompt-host { fill: #7aa2f7; }
      .prompt-dir { fill: #bb9af3; }
      .prompt-char { fill: #f7768e; }
      
      .command-text { 
        fill: #73d0ff; 
        font-weight: 500;
        text-shadow: 0 0 4px rgba(115, 208, 255, 0.6);
      }
      
      .cursor { 
        fill: #73d0ff; 
        opacity: 0;
        animation: blink 0.8s infinite;
        filter: drop-shadow(0 0 3px rgba(115, 208, 255, 0.8));
      }

      /* Glow container shadow styling */
      .terminal-rect {
        stroke: #383e5a;
        stroke-width: 1.5px;
        fill: #1a1b26;
        filter: drop-shadow(0 10px 25px rgba(0,0,0,0.5));
      }

      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
    </style>

    <!-- Clip Paths for Typing Effect -->
    <!-- Line 1: Length ~235px (28 chars) -->
    <clipPath id="clip1">
      <rect x="170" y="45" height="30" width="0">
        <animate attributeName="width" values="0;0;235;235;235" keyTimes="0;0.04;0.16;0.95;1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>

    <!-- Line 2: Length ~320px (38 chars) -->
    <clipPath id="clip2">
      <rect x="170" y="80" height="30" width="0">
        <animate attributeName="width" values="0;0;0;320;320;320" keyTimes="0;0.20;0.21;0.37;0.95;1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>

    <!-- Line 3: Length ~210px (25 chars) -->
    <clipPath id="clip3">
      <rect x="170" y="115" height="30" width="0">
        <animate attributeName="width" values="0;0;0;210;210;210" keyTimes="0;0.41;0.42;0.60;0.95;1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>

    <!-- Line 4: Length ~193px (23 chars) -->
    <clipPath id="clip4">
      <rect x="170" y="150" height="30" width="0">
        <animate attributeName="width" values="0;0;0;193;193;193" keyTimes="0;0.63;0.64;0.79;0.95;1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <!-- Terminal Window Background -->
  <rect class="terminal-rect" x="5" y="5" width="670" height="200" rx="10" />

  <!-- Terminal Title Bar -->
  <path d="M 5,35 L 675,35" stroke="#383e5a" stroke-width="1.5" />
  
  <!-- Window Controls (Tokyo Night Shades) -->
  <circle cx="25" cy="20" r="6" fill="#f7768e" /> <!-- Close -->
  <circle cx="45" cy="20" r="6" fill="#e0af68" /> <!-- Minimize -->
  <circle cx="65" cy="20" r="6" fill="#9ece6a" /> <!-- Maximize -->
  
  <!-- Window Title -->
  <text x="340" y="24" fill="#565f89" font-size="12" text-anchor="middle" font-weight="bold">terminal — leelaprasath@systems: ~ (zsh)</text>

  <!-- LINE 1 Group -->
  <g>
    <!-- Prompt appears instantly (0.1s) -->
    <text x="20" y="65">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.008;0.01;1" dur="12s" repeatCount="indefinite" />
      <tspan class="prompt-user">leela</tspan>
      <tspan class="prompt-host">@systems</tspan>
      <tspan class="prompt-dir">:~</tspan>
      <tspan class="prompt-char"> $</tspan>
    </text>
    
    <!-- Command Text: Typing starts at 0.5s, ends at 2.0s -->
    <text x="170" y="65" class="command-text" clip-path="url(#clip1)">booting ai infrastructure...</text>
    
    <!-- Cursor: Active from 0.1s to 2.4s. Types from 0.5s to 2.0s -->
    <rect class="cursor" y="51" width="8" height="15">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.199;0.20;1" dur="12s" repeatCount="indefinite" />
      <animate attributeName="x" values="170;170;405;405;405" keyTimes="0;0.04;0.16;0.199;1" dur="12s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- LINE 2 Group -->
  <g>
    <!-- Prompt appears at 2.4s -->
    <text x="20" y="100">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.199;0.20;1" dur="12s" repeatCount="indefinite" />
      <tspan class="prompt-user">leela</tspan>
      <tspan class="prompt-host">@systems</tspan>
      <tspan class="prompt-dir">:~</tspan>
      <tspan class="prompt-char"> $</tspan>
    </text>
    
    <!-- Command Text: Typing starts at 2.5s, ends at 4.5s -->
    <text x="170" y="100" class="command-text" clip-path="url(#clip2)">learning distributed architectures...</text>
    
    <!-- Cursor: Active from 2.0s to 4.9s. Types from 2.5s to 4.5s -->
    <rect class="cursor" y="86" width="8" height="15">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.199;0.20;0.407;0.408;1" dur="12s" repeatCount="indefinite" />
      <animate attributeName="x" values="170;170;170;490;490;490" keyTimes="0;0.199;0.208;0.375;0.407;1" dur="12s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- LINE 3 Group -->
  <g>
    <!-- Prompt appears at 4.9s -->
    <text x="20" y="135">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.407;0.408;1" dur="12s" repeatCount="indefinite" />
      <tspan class="prompt-user">leela</tspan>
      <tspan class="prompt-host">@systems</tspan>
      <tspan class="prompt-dir">:~</tspan>
      <tspan class="prompt-char"> $</tspan>
    </text>
    
    <!-- Command Text: Typing starts at 5.0s, ends at 7.2s -->
    <text x="170" y="135" class="command-text" clip-path="url(#clip3)">building agent systems...</text>
    
    <!-- Cursor: Active from 4.5s to 7.6s. Types from 5.0s to 7.2s -->
    <rect class="cursor" y="121" width="8" height="15">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.407;0.408;0.632;0.633;1" dur="12s" repeatCount="indefinite" />
      <animate attributeName="x" values="170;170;170;380;380;380" keyTimes="0;0.407;0.416;0.60;0.632;1" dur="12s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- LINE 4 Group -->
  <g>
    <!-- Prompt appears at 7.6s -->
    <text x="20" y="170">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.632;0.633;1" dur="12s" repeatCount="indefinite" />
      <tspan class="prompt-user">leela</tspan>
      <tspan class="prompt-host">@systems</tspan>
      <tspan class="prompt-dir">:~</tspan>
      <tspan class="prompt-char"> $</tspan>
    </text>
    
    <!-- Command Text: Typing starts at 7.7s, ends at 9.5s -->
    <text x="170" y="170" class="command-text" clip-path="url(#clip4)">engineering &gt; shortcuts</text>
    
    <!-- Cursor: Active from 7.2s to 11.5s. Types from 7.7s to 9.5s. Blinks until 11.5s, then fades -->
    <rect class="cursor" y="156" width="8" height="15">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.632;0.633;0.958;0.959" dur="12s" repeatCount="indefinite" />
      <animate attributeName="x" values="170;170;170;363;363;363" keyTimes="0;0.632;0.641;0.791;0.958;1" dur="12s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- GLOBAL FADE OUT FOR SMOOTH LOOP -->
  <!-- Whole board opacity animation over the 12s period -->
  <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.958;0.975;0.991;1" dur="12s" repeatCount="indefinite" />
</svg>
